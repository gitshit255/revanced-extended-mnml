enable-module-update = true # set this to false if you do not want to receive updates for the module
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe MNML"
parallel-jobs = 1

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config

[YouTube]
build-mode = "both"
version = "auto"
excluded-patches = "'Alternative thumbnails' 'Change form factor' 'Change header' 'Change start page' 'Disable double tap actions' 'Disable haptic feedback' 'Disable rolling number animations' 'Disable video codecs' 'Double tap to seek' 'Enable debugging' 'Hide end screen cards' 'Hide info cards' 'Hide related videos' 'Hide timestamp' 'Open Shorts in regular player' 'Open videos fullscreen' 'Reload video' 'Shorts autoplay' 'Spoof device dimensions'"
patcher-args = "-e 'Theme' -OdarkThemeBackgroundColor=@android:color/system_neutral1_900"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
module-prop-name = "yt-rvx-mnml"

[Music]
build-mode = "both"
app-name = "YouTube-Music"
version = "auto"
arch = "arm64-v8a"
excluded-patches = "'Change start page' 'Enable debugging' 'Hide category bar'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music/"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
module-prop-name = "ytm-rvx-mnml"
